<!DOCTYPE html>
<html>
<head>
    <title>Painel de Técnicos</title>
</head>
<body>

<h2>Buscar técnicos por cidade</h2>

<input type="text" id="cidade" placeholder="Digite a cidade">
<button onclick="buscar()">Buscar</button>

<table border="1" id="tabela">
    <thead>
        <tr>
            <th>Nome</th>
            <th>Cidade</th>
            <th>Estado</th>
            <th>Telefone</th>
            <th>Distância (km)</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
async function buscar() {
    const cidade = document.getElementById('cidade').value;

    const res = await fetch(`/buscar?cidade=${cidade}`);
    const dados = await res.json();

    const tbody = document.querySelector('#tabela tbody');
    tbody.innerHTML = '';

    dados.forEach(t => {
        const row = `
            <tr>
                <td>${t.nome}</td>
                <td>${t.cidade}</td>
                <td>${t.estado}</td>
                <td>${t.telefone}</td>
                <td>${t.distancia.toFixed(2)}</td>
            </tr>
        `;
        tbody.innerHTML += row;
    });
}
</script>

</body>
</html>
